info:
  name: DAILY
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/report-verification/history/daily"
  body:
    type: multipart-form
    data:
      - name: EstateCode
        type: text
        value: AL
        description: EstateCode
      - name: WorkingDivisionCode
        type: text
        value: Div.I
        description: WorkingDivisionCode
      - name: TransactionDate
        type: text
        value: 2025-06-20
        description: Transaction date
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
