info:
  name: Rainfall (curah hujan)
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url}}/api/report-verification/history/rainfall"
  body:
    type: multipart-form
    data:
      - name: EstateCode
        type: text
        value: AL
        description: EstateCode
      - name: WorkingDivisionCode
        type: text
        value: Div.I
        description: WorkingDivisionCode
      - name: TransactionDate
        type: text
        value: 2026-02-01
        description: Transaction date
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
