info:
  name: ALPHA_M_LIST
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/report-meteorology-alpha/list"
  body:
    type: multipart-form
    data:
      - name: EstateCode
        type: text
        value: LB
      - name: WorkingDivisionCode
        type: text
        value: Div.IV
      - name: TransactionYear
        type: text
        value: "2026"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
