  url: "{{base_url}}/api/activities-contractor/get-contractor-by-mandor"
  body:
    type: multipart-form
    data:
      - name: EstateCode
        type: text
        value: AL
        description: Estate Code (mandatory)
      - name: DivisionCode
        type: text
