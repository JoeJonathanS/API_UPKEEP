        description: DivisionCode mandor
      - name: EmployeeNumber
        type: text
        value: "2011084"
        description: EmployeeNumber mandor
      - name: date
        type: text
        value: 2025-08-13
        description: transaction date
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
