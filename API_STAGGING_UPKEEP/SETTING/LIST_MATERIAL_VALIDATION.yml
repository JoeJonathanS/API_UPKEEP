    type: multipart-form
    data:
      - name: EstateCode
        type: text
        value: NL
      - name: TransactionDate
        type: text
        value: 2026-04-29
      - name: EmployeeNumber
        type: text
        value: "1701716"
        description: Mandor Employee Number
        disabled: true
