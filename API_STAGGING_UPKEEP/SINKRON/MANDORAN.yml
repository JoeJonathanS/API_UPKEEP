  scripts:
    - type: after-response
      code: "var template = `\r

        <style type=\"text/css\">\r

        \    .tftable {font-size:14px;color:#333333;width:100%;border-width: 1px;border-color: #87ceeb;border-collapse: collapse;}\r

        \    .tftable th {font-size:18px;background-color:#87ceeb;border-width: 1px;padding: 8px;border-style: solid;border-color: #87ceeb;text-align:left;}\r

        \    .tftable tr {background-color:#ffffff;}\r

        \    .tftable td {font-size:14px;border-width: 1px;padding: 8px;border-style: solid;border-color: #87ceeb;}\r

        \    .tftable tr:hover {background-color:#e0ffff;}\r

        </style>\r

        \r

        <table class=\"tftable\" border=\"1\">\r

        \    <tr>\r

        \        \r

        \        <th>Estate Code</th>\r

        \       \r

        \       \r

        \        <th>Division Code</th>\r

        \      \r

        \        \r

        \        <th>Workgroup Code</th>\r

        \        \r

        \        \r

        \        \r

        \        <th>Allocation Code</th>\r

        \        <th>Allocation Name</th>\r

        \        \r

        \        <th>Is WorkGroup Leader</th>\r

        \        \r

        \        <th>Employee Number</th>\r

        \        <th>Employee Name</th>\r

        \       \r

        \        <th>Workgroup Role Code</th>\r

        \        <th>Workgroup Role Name</th>\r

        \        \r

        \    </tr>\r

        \    \r

        \    {{#each response.data}}\r

        \        <tr>\r

        \           \r

        \            <td>{{EstateCode}}</td>\r

        \            \r

        \            \r

        \            <td>{{DivisionCode}}</td>\r

        \           \r

        \            \r

        \            <td>{{WorkgroupCode}}</td>\r

        \            \r

        \            \r

        \           \r

        \            <td>{{AllocationCode}}</td>\r

        \            <td>{{AllocationName}}</td>\r

        \           \r

        \            <td>{{IsWorkGroupLeader}}</td>\r

        \            \r

        \            <td>{{EmployeeNumber}}</td>\r

        \            <td>{{EmployeeName}}</td>\r

        \            \r

        \            <td>{{WorkgroupRoleCode}}</td>\r

        \            <td>{{WorkgroupRoleName}}</td>\r

        \           \r

        \        </tr>\r

        \    {{/each}}\r

        </table>\r

        `;\r

        \r

        function constructVisualizerPayload() {\r

        \    return {response: res.getBody()};\r

        }\r

        \r

        bru.visualize(\"html\", {\r

        \    template: template,\r

        \    data: constructVisualizerPayload()\r

        });"

