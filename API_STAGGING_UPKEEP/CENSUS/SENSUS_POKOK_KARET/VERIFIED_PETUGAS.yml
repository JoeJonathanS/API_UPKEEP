info:
  name: VERIFIED_PETUGAS
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/cencus/tree/rubber/verified-by-worker"
  body:
    type: multipart-form
    data:
      - name: uuid
        type: text
        value: xxx-yyy-zzz
      - name: EstateCode
        type: text
        value: AP
      - name: WorkingDivisionCode
        type: text
        value: Div. I
      - name: finish_status
        type: text
        value: "1"
        description: 1 jika sensus selesai, 0 jika belum
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
