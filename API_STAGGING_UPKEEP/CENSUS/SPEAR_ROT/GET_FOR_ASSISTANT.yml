info:
  name: GET_FOR_ASSISTANT
  type: http
  seq: 8

http:
  method: POST
  url: "{{base_url}}/api/cencus/spear-rot/get-by-assistant"
  body:
    type: multipart-form
    data:
      - name: EstateCode
        type: text
        value: TG
        description: Assistant estate code
      - name: DivisionCode
        type: text
        value: Div.III
        description: Assistant div code
      - name: date
        type: text
        value: 2025-03-03
        description: transaction date
      - name: EmployeeNumber
        type: text
        value: "3840"
        description: employee num of user
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
